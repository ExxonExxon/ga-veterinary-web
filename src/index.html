<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA Veterinary | Compassionate Care for Pets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-paw text-blue-600 text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight text-gray-800">GA VETERINARY</span>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="#" class="text-blue-600">Home</a>
                    <a href="#" class="hover:text-blue-600 transition">Services</a>
                    <a href="#" class="hover:text-blue-600 transition">About</a>
                    <a href="#" class="hover:text-blue-600 transition">Contact</a>
                </div>
                <button class="bg-blue-600 text-white px-5 py-2 rounded-full font-semibold hover:bg-blue-700 transition shadow-md">
                    Book Now
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative bg-white pt-16 pb-32 overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="lg:grid lg:grid-cols-12 lg:gap-8">
                <div class="sm:text-center md:max-w-2xl md:mx-auto lg:col-span-6 lg:text-left">
                    <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl">
                        <span class="block text-blue-600">Expert Care</span>
                        <span class="block">For Your Best Friends</span>
                    </h1>
                    <p class="mt-3 text-base text-gray-500 sm:mt-5 sm:text-xl lg:text-lg xl:text-xl">
                        Providing comprehensive, compassionate veterinary services in a welcoming environment. Your pet's health and happiness are our top priorities.
                    </p>
                    <div class="mt-8 sm:max-w-lg sm:mx-auto sm:text-center lg:text-left lg:mx-0">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                                View Services
                            </button>
                            <button class="border-2 border-gray-200 text-gray-700 px-8 py-3 rounded-lg font-bold hover:bg-gray-50 transition">
                                Meet the Team
                            </button>
                        </div>
                    </div>
                </div>
                <div class="mt-12 relative sm:max-w-lg sm:mx-auto lg:mt-0 lg:max-w-none lg:mx-0 lg:col-span-6 lg:flex lg:items-center">
                    <!-- Placeholder for image -->
                    <div class="relative mx-auto w-full rounded-2xl shadow-lg overflow-hidden lg:max-w-md">
                        <div class="bg-gray-200 aspect-square flex items-center justify-center text-gray-400 italic">
                            [Hero Image Placeholder]
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Features/Services Grid will go here -->
    </main>

    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2026 GA Veterinary Clinic. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
